<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Practice Portal</title>
  <style>
    /* ── TOKENS ── */
    :root {
      --c-bg: #f7f9fc;
      --c-card: #ffffff;
      --c-primary: #4f46e5;
      --c-primary-light: #ede9fe;
      --c-accent: #f59e0b;
      --c-accent-light: #fef3c7;
      --c-success: #10b981;
      --c-success-light: #d1fae5;
      --c-danger: #ef4444;
      --c-danger-light: #fee2e2;
      --c-text: #1e1b4b;
      --c-muted: #6b7280;
      --c-border: #e5e7eb;
      --radius: 16px;
      --shadow: 0 4px 20px rgba(79,70,229,.10);
      --shadow-sm: 0 2px 8px rgba(0,0,0,.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; }

    /* ── HEADER ── */
    header {
      background: var(--c-primary);
      color: #fff;
      padding: 18px 24px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(79,70,229,.35);
    }
    header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: .3px; }
    header p  { font-size: .8rem; opacity: .8; margin-top: 2px; }

    /* ── CONTAINER ── */
    .wrap { max-width: 600px; margin: 0 auto; padding: 24px 16px 60px; }

    /* ── STUDENT SELECT ── */
    #screen-home .hero {
      text-align: center;
      padding: 32px 0 24px;
    }
    #screen-home .hero .emoji { font-size: 3.5rem; }
    #screen-home .hero h2 { font-size: 1.5rem; font-weight: 700; margin-top: 10px; }
    #screen-home .hero p  { color: var(--c-muted); margin-top: 6px; }
    .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 20px; }
    .student-btn {
      background: var(--c-card);
      border: 2px solid var(--c-border);
      border-radius: var(--radius);
      padding: 20px 14px;
      cursor: pointer;
      text-align: center;
      transition: all .18s;
      box-shadow: var(--shadow-sm);
    }
    .student-btn:hover { border-color: var(--c-primary); box-shadow: var(--shadow); }
    .student-btn .avatar { font-size: 2.2rem; }
    .student-btn .name   { font-weight: 700; font-size: .95rem; margin-top: 6px; }

    /* ── UNIT SELECT ── */
    #screen-units .greeting {
      background: var(--c-primary);
      color: #fff;
      border-radius: var(--radius);
      padding: 18px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #screen-units .greeting h2 { font-size: 1.1rem; font-weight: 700; }
    #screen-units .greeting p  { font-size: .8rem; opacity: .8; margin-top: 2px; }
    .switch-btn {
      background: rgba(255,255,255,.2);
      border: none;
      color: #fff;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: .8rem;
      flex-shrink: 0;
    }
    .unit-grid { display: grid; gap: 12px; }
    .unit-card {
      background: var(--c-card);
      border: 2px solid var(--c-border);
      border-radius: var(--radius);
      padding: 18px 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: all .18s;
      box-shadow: var(--shadow-sm);
    }
    .unit-card:hover { border-color: var(--c-primary); box-shadow: var(--shadow); }
    .unit-card.done { border-color: var(--c-success); background: var(--c-success-light); }
    .unit-card .icon { font-size: 2rem; flex-shrink: 0; }
    .unit-card .meta h3 { font-size: 1rem; font-weight: 700; }
    .unit-card .meta p  { font-size: .8rem; color: var(--c-muted); margin-top: 2px; }
    .unit-card .badge {
      margin-left: auto;
      font-size: .75rem;
      background: var(--c-success);
      color: #fff;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    /* ── QUIZ ── */
    #screen-quiz .quiz-header {
      background: var(--c-primary);
      color: #fff;
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 20px;
    }
    #screen-quiz .quiz-header .unit-label { font-size: .8rem; opacity: .8; }
    #screen-quiz .quiz-header h2 { font-size: 1.1rem; font-weight: 700; margin-top: 2px; }
    .progress-bar-wrap {
      background: rgba(255,255,255,.25);
      border-radius: 99px;
      height: 6px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #fff;
      height: 100%;
      border-radius: 99px;
      transition: width .3s;
    }
    .q-card {
      background: var(--c-card);
      border-radius: var(--radius);
      padding: 22px 18px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 14px;
    }
    .q-card .q-num { font-size: .75rem; color: var(--c-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .q-card .q-text { font-size: 1rem; font-weight: 600; margin-top: 6px; line-height: 1.5; }
    .options-grid { display: grid; gap: 10px; margin-top: 14px; }
    .opt-btn {
      background: var(--c-bg);
      border: 2px solid var(--c-border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: pointer;
      font-size: .9rem;
      text-align: left;
      transition: all .15s;
      line-height: 1.4;
    }
    .opt-btn:hover:not(:disabled) { border-color: var(--c-primary); background: var(--c-primary-light); }
    .opt-btn.correct  { border-color: var(--c-success); background: var(--c-success-light); color: #065f46; font-weight: 600; }
    .opt-btn.wrong    { border-color: var(--c-danger);  background: var(--c-danger-light);  color: #7f1d1d; }
    .opt-btn:disabled { cursor: default; }
    .fill-input {
      width: 100%;
      border: 2px solid var(--c-border);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: .95rem;
      margin-top: 12px;
      outline: none;
      transition: border .15s;
    }
    .fill-input:focus { border-color: var(--c-primary); }
    .fill-input.correct { border-color: var(--c-success); background: var(--c-success-light); }
    .fill-input.wrong   { border-color: var(--c-danger);  background: var(--c-danger-light); }
    .feedback-msg {
      font-size: .85rem;
      margin-top: 8px;
      font-weight: 600;
      display: none;
    }
    .feedback-msg.show { display: block; }
    .feedback-msg.ok  { color: var(--c-success); }
    .feedback-msg.bad { color: var(--c-danger); }

    .submit-btn {
      display: block;
      width: 100%;
      background: var(--c-primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 15px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity .15s;
    }
    .submit-btn:hover { opacity: .88; }
    .submit-btn:disabled { opacity: .5; cursor: default; }

    /* ── RESULTS ── */
    #screen-result .result-card {
      background: var(--c-card);
      border-radius: var(--radius);
      padding: 32px 24px;
      text-align: center;
      box-shadow: var(--shadow);
      margin-top: 30px;
    }
    .score-ring {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: var(--c-primary-light);
      border: 5px solid var(--c-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
    }
    .score-ring .num { font-size: 2rem; font-weight: 800; color: var(--c-primary); }
    .score-ring .den { font-size: .75rem; color: var(--c-muted); }
    #result-title   { font-size: 1.3rem; font-weight: 700; }
    #result-subtitle{ color: var(--c-muted); margin-top: 6px; font-size: .9rem; }
    .email-status   { margin-top: 12px; font-size: .83rem; color: var(--c-muted); min-height: 20px; }
    .btn-secondary {
      display: inline-block;
      margin-top: 20px;
      background: var(--c-primary-light);
      color: var(--c-primary);
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-secondary:hover { opacity: .8; }

    /* answers review */
    .answers-review { margin-top: 24px; text-align: left; }
    .answers-review h3 { font-size: .9rem; font-weight: 700; color: var(--c-muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
    .ans-row {
      background: var(--c-bg);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      border-left: 4px solid var(--c-border);
    }
    .ans-row.ok  { border-color: var(--c-success); }
    .ans-row.bad { border-color: var(--c-danger); }
    .ans-row .q  { font-size: .85rem; font-weight: 600; }
    .ans-row .a  { font-size: .82rem; color: var(--c-muted); margin-top: 3px; }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 20px;
      font-size: .75rem;
      color: var(--c-muted);
    }
  </style>
</head>

};

const UNITS = [unit1, unit2, unit3, unit4, unit5];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let currentStudent = null;
let currentUnit    = null;
let userAnswers    = {};   // questionIndex -> value
let answered       = {};   // questionIndex -> bool

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}
function storageKey(student, unit) { return `f3_done_${student}_${unit}`; }
function isDone(studentId, unitId) {
  return !!localStorage.getItem(storageKey(studentId, unitId));
}
function markDone(studentId, unitId) {
  localStorage.setItem(storageKey(studentId, unitId), '1');
}

/* ═══════════════════════════════════════════
   HOME SCREEN
═══════════════════════════════════════════ */
function renderHome() {
  const grid = document.getElementById('student-grid');
  grid.innerHTML = STUDENTS.map(s => `
    <button class="student-btn" onclick="selectStudent('${s.id}')">
      <div class="avatar">${s.avatar}</div>
      <div class="name">${s.name}</div>
    </button>
  `).join('');
}
function selectStudent(id) {
  currentStudent = STUDENTS.find(s => s.id === id);
  document.getElementById('greeting-name').textContent = `Hi, ${currentStudent.name}! 👋`;
  renderUnits();
  show('screen-units');
}
function goHome() { show('screen-home'); }

/* ═══════════════════════════════════════════
   UNITS SCREEN
═══════════════════════════════════════════ */
function renderUnits() {
  const grid = document.getElementById('unit-grid');
  grid.innerHTML = UNITS.map(u => {
    const done = isDone(currentStudent.id, u.id);
    return `
      <div class="unit-card ${done ? 'done' : ''}" onclick="startUnit('${u.id}')">
        <div class="icon">${u.icon}</div>
        <div class="meta">
          <h3>${u.label}: ${u.title}</h3>
          <p>${u.questions.length} questions</p>
        </div>
        ${done ? '<span class="badge">⭐ Done</span>' : ''}
      </div>
    `;
  }).join('');
}
function backToUnits() { renderUnits(); show('screen-units'); }

/* ═══════════════════════════════════════════
   QUIZ SCREEN
═══════════════════════════════════════════ */
function startUnit(unitId) {
  currentUnit  = UNITS.find(u => u.id === unitId);
  userAnswers  = {};
  answered     = {};

  document.getElementById('quiz-unit-label').textContent = currentUnit.label;
  document.getElementById('quiz-unit-title').textContent = currentUnit.title;
  document.getElementById('progress-bar').style.width = '0%';

  renderQuestions();
  show('screen-quiz');
}

function renderQuestions() {
  const container = document.getElementById('questions-container');
  container.innerHTML = currentUnit.questions.map((q, i) => buildQuestionHTML(q, i)).join('');
  document.getElementById('submit-btn').disabled = false;
}

function buildQuestionHTML(q, i) {
  if (q.type === 'mc') {
    const opts = q.options.map((opt, j) => `
      <button class="opt-btn" id="opt-${i}-${j}" onclick="selectOption(${i}, ${j})">
        ${String.fromCharCode(65+j)}. ${opt}
      </button>
    `).join('');
    return `
      <div class="q-card" id="qcard-${i}">
        <div class="q-num">Question ${i+1} of ${currentUnit.questions.length}</div>
        <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
        <div class="options-grid">${opts}</div>
        <div class="feedback-msg" id="fb-${i}"></div>
      </div>
    `;
  } else {
    return `
      <div class="q-card" id="qcard-${i}">
        <div class="q-num">Question ${i+1} of ${currentUnit.questions.length}</div>
        <div class="q-text">${q.text.replace(/\n/g,'<br>')}</div>
        <input class="fill-input" id="fill-${i}" type="text"
          placeholder="Write your answer here…"
          oninput="recordFill(${i}, this.value)" />
        <div class="feedback-msg" id="fb-${i}"></div>
      </div>
    `;
  }
}

function selectOption(qIdx, optIdx) {
  const q = currentUnit.questions[qIdx];
  // Disable all options for this question
  q.options.forEach((_, j) => {
    const btn = document.getElementById(`opt-${qIdx}-${j}`);
    btn.disabled = true;
    btn.classList.remove('correct','wrong');
    if (j === q.answer) btn.classList.add('correct');
  });
  const chosen = document.getElementById(`opt-${qIdx}-${optIdx}`);
  if (optIdx !== q.answer) chosen.classList.add('wrong');

  userAnswers[qIdx] = optIdx;
  answered[qIdx]    = true;

  const fb = document.getElementById(`fb-${qIdx}`);
  fb.classList.add('show');
  if (optIdx === q.answer) {
    fb.textContent = '✅ Correct!';
    fb.className = 'feedback-msg show ok';
  } else {
    fb.textContent = `❌ Not quite — the answer is: ${q.options[q.answer]}`;
    fb.className = 'feedback-msg show bad';
  }
  updateProgress();
}

function recordFill(qIdx, val) {
  userAnswers[qIdx] = val.trim().toLowerCase();
}

function updateProgress() {
  const total    = currentUnit.questions.length;
  const done     = Object.keys(answered).length;
  document.getElementById('progress-bar').style.width = `${(done/total)*100}%`;
}

/* ═══════════════════════════════════════════
   SUBMIT
═══════════════════════════════════════════ */
function submitQuiz() {
  // Evaluate fill-in answers
  currentUnit.questions.forEach((q, i) => {
    if (q.type === 'fill') {
      const input = document.getElementById(`fill-${i}`);
      const val   = (input ? input.value.trim().toLowerCase() : '');
      userAnswers[i] = val;
      answered[i]    = true;

      const correct = val === q.answer.toLowerCase();
      input.classList.remove('correct','wrong');
      input.classList.add(correct ? 'correct' : 'wrong');
      input.disabled = true;

      const fb = document.getElementById(`fb-${i}`);
      fb.classList.add('show');
      if (correct) {
        fb.textContent = '✅ Correct!';
        fb.className = 'feedback-msg show ok';
      } else {
        fb.textContent = `❌ The answer is: ${q.answer}`;
        fb.className = 'feedback-msg show bad';
      }
    }
  });

  // Calculate score
  let score = 0;
  const total = currentUnit.questions.length;
  const results = currentUnit.questions.map((q, i) => {
    let correct = false;
    if (q.type === 'mc') {
      correct = userAnswers[i] === q.answer;
    } else {
      correct = (userAnswers[i] || '') === q.answer.toLowerCase();
    }
    if (correct) score++;
    return { q: q.text, correct, given: userAnswers[i], expected: q.answer };
  });

  markDone(currentStudent.id, currentUnit.id);
  showResult(score, total, results);
}

/* ═══════════════════════════════════════════
   RESULT SCREEN
═══════════════════════════════════════════ */
function showResult(score, total, results) {
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-den').textContent = `/ ${total}`;

  const pct = Math.round((score/total)*100);
  let title, sub;
  if (pct === 100)      { title = 'Perfect! 🌟';          sub = 'You got everything right! Amazing!'; }
  else if (pct >= 80)   { title = 'Well done! 🎉';         sub = 'Really great work! Keep it up!'; }
  else if (pct >= 60)   { title = 'Good try! 😊';          sub = 'You\'re getting there — keep practising!'; }
  else                  { title = 'Keep going! 💪';         sub = 'Review your lesson and try again!'; }

  document.getElementById('result-title').textContent    = title;
  document.getElementById('result-subtitle').textContent = sub;

  // Answers review
  const reviewEl = document.getElementById('answers-review');
  reviewEl.innerHTML = `<h3>📋 See my answers</h3>` +
    results.map((r,i) => `
      <div class="ans-row ${r.correct ? 'ok' : 'bad'}">
        <div class="q">${i+1}. ${r.q.replace(/\n/g,' ')}</div>
        <div class="a">
          ${r.correct
            ? '✅ Correct!'
            : `❌ Your answer: "${r.given !== undefined ? r.given : '(blank)'}" — Correct: "${r.expected}"`
          }
        </div>
      </div>
    `).join('');

  // Send email for units 4 & 5
  const statusEl = document.getElementById('email-status');
  statusEl.textContent = '';
  if (currentUnit.sendEmail) {
    sendResultsEmail(score, total, results, statusEl);
  }

  show('screen-result');
}

/* ═══════════════════════════════════════════
   FORMSPREE EMAIL SUBMISSION
═══════════════════════════════════════════ */
async function sendResultsEmail(score, total, results, statusEl) {
  statusEl.textContent = '📧 Sending results to teacher…';

  const breakdown = results.map((r,i) =>
    `Q${i+1}: ${r.correct ? '✅' : '❌'} — ${r.q.replace(/\n/g,' ').substring(0,60)} | Student: "${r.given !== undefined ? r.given : '(blank)'}" | Correct: "${r.expected}"`
  ).join('\n');

  const body = {
    _subject: `[F3] ${currentStudent.name} — ${currentUnit.label}: ${score}/${total} (${Math.round(score/total*100)}%)`,
    student:  currentStudent.name,
    unit:     `${currentUnit.label}: ${currentUnit.title}`,
    score:    `${score} / ${total}  (${Math.round(score/total*100)}%)`,
    breakdown: breakdown,
    timestamp: new Date().toLocaleString('en-GB', {timeZone:'Europe/Istanbul'}),
    _replyto: currentStudent.email || 'no-email@example.com',
  };

  try {
    const res = await fetch(FORMSPREE_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      statusEl.textContent = '✅ Results sent to your teacher!';
    } else {
      statusEl.textContent = '⚠️ Could not send results (check your Formspree ID).';
    }
  } catch(e) {
    statusEl.textContent = '⚠️ Network error — results not sent.';
  }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
renderHome();
</script>
</body>
